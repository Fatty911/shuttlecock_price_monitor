channels:
  - id: taobao
    name: 淘宝/天猫
    search_url: https://s.taobao.com/search?q={query}
    cart_discount_note: 重点核对跨店满减、店铺券、88VIP、淘金币和直播间券；页面自动抓取不到的券会标为需人工确认。
  - id: jd
    name: 京东
    search_url: https://search.jd.com/Search?keyword={query}
    cart_discount_note: 重点核对满减、京券/东券、Plus 会员券、店铺券和支付券。
  - id: pdd
    name: 拼多多
    search_url: https://mobile.yangkeduo.com/search_result.html?search_key={query}
    cart_discount_note: 重点核对百亿补贴、店铺券、多件折扣、平台券和支付优惠。
models:
  - brand: 尤尼克斯
    names: [AS05, AS20, AS30]
    speeds: ['76', '77', '78']
    aliases: [YONEX, YY]
    notes: AS05 以下飞行不优先；AS40 及以上默认太贵不纳入常用清单。
  - brand: 亚狮龙
    names: [Classic, Supreme, Ultimate, '1号', '2号']
    speeds: ['76', '77', '78']
    aliases: [RSL]
    notes: Ultimate 仅在比 Supreme 贵个位数时优先；2号以下和 D5 默认毛片偏薄。
  - brand: 李宁
    names: [G700, G800, C90]
    speeds: ['76', '77', '78']
    aliases: [LI-NING, Lining]
    notes: G600 飞行略不满，G900 默认太贵。
  - brand: 胜利 Victor
    names: [大师3, 大师4]
    speeds: ['76', '77', '78']
    aliases: [VICTOR, 胜利]
    notes: 无大师2；大师1和 ACE 默认太贵，大师5 飞行/毛片不优先。
  - brand: 澳加林
    names: [AC50]
    speeds: ['76', '77', '78']
    aliases: [Aojialin]
    notes: AC30 可作备选但不进入默认重点清单。
  - brand: 华美
    names: [GT900]
    speeds: ['76', '77', '78']
    aliases: [HUAMEI]
    notes: 常用国产高性价比候选。
  - brand: 骄点
